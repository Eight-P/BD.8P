# CSS build action v2
# Build T1 & Snippest css and deploy to dist branch
name: buildCss

on:
  push:
    branches:
    - master
    paths:
    - "**/Themes/**/*.main.scss"

permissions:
  contents: write

jobs:

  GetChanges:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      t1: ${{ steps.filter.outputs.t1 }}
      snippets: ${{ steps.filter.outputs.snippets }}

    steps:
    - uses: actions/checkout@v6
    
    - name: Identify file changes.
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          t1: '**/T1.main.scss'
          snippets: '**/Snippets/*.main.scss'

  Build:
    needs: GetChanges
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - run: npm ci

    # Just gonna do all cp recursively.
    - name: Build T1 css
      if: needs.GetChanges.outputs.t1 == 'true'
      run: |
        npm run buildCSS -w Themes/T1
        cp -r Themes/T1/dist temp-t1

    - name: Build Snippets css
      if: needs.GetChanges.outputs.snippets == 'true'
      run: |
        echo "snippets build test"

    - name: Switch to dist branch
      run: |
        git fetch origin dist
        git switch -f dist

    # Needs to remove previous files, I think.
    - name: Add T1 output to dist
      if: needs.GetChanges.outputs.t1 == 'true'
      run: |
        rm -rf Themes/T1/dist
        cp -r temp-t1 Themes/T1/dist

    - name: Add Snippets output to dist
      if: needs.GetChanges.outputs.snippets == 'true'
      run: |
        echo "snippets deploy output test"

    # If nothing was built for some reason, this is expected to fail.
    - name: Get status & stage output
      run: |
        git status
        git add **/dist/*.css
    
    - name: Commit & push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git commit -m "build for: ${{ github.event.head_commit.id }}"
        git push origin dist
